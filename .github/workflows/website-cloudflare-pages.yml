name: Publish Website to CloudFlare Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "websites/**"
    branches:
      - main

env:
  NODE_VERSION: 24.x
  DOMAIN_NAME: middy.js.org

permissions:
  contents: read

jobs:
  website:
    name: Publish website
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --workspace websites/${{ env.DOMAIN_NAME }}
      - name: Build website
        working-directory: websites/${{ env.DOMAIN_NAME }}
        run: |
          npm run build
      - name: Publish website
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          workingDirectory: websites/${{ env.DOMAIN_NAME }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: |
            pages deploy
