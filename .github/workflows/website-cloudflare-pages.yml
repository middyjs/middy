name: Publish Website to CloudFlare Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "websites/**"
    branches:
      - main

env:
  NODE_VERSION: 24.x
  DOMAIN_NAME: middy.js.org

permissions:
  contents: read

jobs:
  website:
    name: Publish website
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --workspace websites/${{ env.DOMAIN_NAME }}
      - name: Build website
        working-directory: websites/${{ env.DOMAIN_NAME }}
        run: |
          npm run build
      - name: Publish website
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          workingDirectory: websites/${{ env.DOMAIN_NAME }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: |
            pages deploy
