name: Publish Website to CloudFlare Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "websites/**"
    branches:
      - main

env:
  NODE_VERSION: 24.x
  DOMAIN_NAME: middy.js.org

permissions:
  contents: read

jobs:
  website:
    name: Publish website
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --workspace websites/${{ env.DOMAIN_NAME }}
      - name: Build website
        working-directory: websites/${{ env.DOMAIN_NAME }}
        run: |
          npm run build
      - name: Publish website
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          workingDirectory: websites/${{ env.DOMAIN_NAME }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: |
            pages deploy
