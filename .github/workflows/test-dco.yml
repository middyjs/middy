name: Tests (dco)

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: Tests (dco)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Check for Developer Certificate of Origin (DCO) compiance
        uses: KineticCafe/actions-dco@f7fe2fdfb5808e2528042be3919b67079100b96b # v3.0.0
